name: trivy

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docker/**'
      - 'chromium-*.conf'
      - 'supervisord-*.conf'
      - 'start-*.sh'
      - '.github/workflows/trivy.yml'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  trivy:
    name: Scan production image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build production image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: docker/production/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: chromium-server-docker:trivy
          build-args: |
            user_id=1001
            group_id=1001
          cache-from: type=gha,scope=production

      - name: Run Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: chromium-server-docker:trivy
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fc6561ed893d15cec696e062df840b21db27eb0 # v4.35.2
        with:
          sarif_file: trivy-results.sarif
          category: trivy
