name: docker-build

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'docker/**'
      - 'chromium-*.conf'
      - 'supervisord-*.conf'
      - 'start-*.sh'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [production, development]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build ${{ matrix.variant }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/${{ matrix.variant }}/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: chromium-server-docker:${{ matrix.variant }}
          build-args: |
            user_id=1001
            group_id=1001
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

  smoke:
    name: CDP smoke test (production)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build production image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/production/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: chromium-server-docker:smoke
          build-args: |
            user_id=1001
            group_id=1001
          cache-from: type=gha,scope=production

      - name: Start container
        run: |
          docker run -d --rm --init --name smoke -p 9222:9222 chromium-server-docker:smoke

      - name: Wait for CDP and verify response
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9222/json/version | grep -q webSocketDebuggerUrl; then
              echo "CDP is up after ${i}s"
              curl -s http://localhost:9222/json/version
              exit 0
            fi
            sleep 1
          done
          echo "CDP did not respond within 30s" >&2
          exit 1

      - name: Capture logs on failure
        if: failure()
        run: |
          docker logs smoke || true
          docker exec smoke cat /tmp/chromium-stderr.log 2>/dev/null || true
          docker exec smoke cat /tmp/socat-stderr.log 2>/dev/null || true

      - name: Stop container
        if: always()
        run: docker rm -f smoke || true
