# Chromium startup options (Production - Headless)
#
# Each line contains one option.
# Empty lines and comment lines (starting with #) are ignored.
#
# Customization:
#   Copy this file, edit it, and mount it when starting the container:
#   docker container run --mount type=bind,src=/path/to/custom.conf,dst=/app/chromium-headless.conf,readonly ...

--headless
--remote-debugging-port=9223
--remote-debugging-address=127.0.0.1
--no-first-run
--no-default-browser-check
--disable-background-networking
--disable-dev-shm-usage
--disable-gpu
--no-sandbox
--disable-setuid-sandbox
--disable-blink-features=AutomationControlled
# 1 GiB. Must stay under int32 max (2147483647); Chromium silently rejects larger values.
--disk-cache-size=1073741824
--user-data-dir=/tmp/chrome-profile
